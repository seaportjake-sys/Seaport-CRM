<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seaport CRM">
<title>Seaport Inlet Marina</title>
<style>
:root{--navy:#1B2A4A;--navy2:#243556;--navy3:#2E4270;--gold:#C9A84C;--gold2:#F0D080;--hot:#F59E0B;--hot-bg:#FFF8E6;--hot-tx:#92600A;--warm:#22C55E;--warm-bg:#E8F8EE;--warm-tx:#1A6B3C;--cold:#3B82F6;--cold-bg:#EBF3FF;--cold-tx:#1E40AF;--dead:#9CA3AF;--dead-bg:#F3F4F6;--dead-tx:#4B5563;--red:#EF4444;--red-bg:#FEE2E2;--green:#16A34A;--green-bg:#DCFCE7;--amber:#D97706;--amber-bg:#FEF3C7;--gray:#6B7280;--border:#E5E7EB;--bg:#F0F2F7}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;padding-bottom:80px}
.navbar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 16px rgba(0,0,0,.4)}
.nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:rgba(255,255,255,.35);cursor:pointer;transition:color .15s;position:relative}
.nav-btn.active{color:var(--gold)}
.nav-btn .ni{font-size:20px;line-height:1}
.nav-btn .nl{font-size:9px;font-weight:700;letter-spacing:.4px;margin-top:1px}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:white;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}
.header{background:var(--navy);padding:12px 16px 12px;padding-top:calc(12px + env(safe-area-inset-top,0px));box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-txt .t{color:var(--gold);font-weight:700;font-size:15px;letter-spacing:.5px}
.brand-txt .s{color:rgba(255,255,255,.4);font-size:9px;letter-spacing:2px;margin-top:1px}
.hdr-btn{background:var(--gold);color:var(--navy);border:none;border-radius:22px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.page{display:none}.page.active{display:block}
.stats-row{display:flex;gap:10px;overflow-x:auto;padding:14px 16px 6px;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat{flex-shrink:0;border-radius:14px;padding:12px 14px;text-align:center;border:1.5px solid;min-width:84px;cursor:pointer;background:white;transition:transform .1s}
.stat:active{transform:scale(.97)}
.stat-n{font-size:24px;font-weight:700}
.stat-l{font-size:9px;color:var(--gray);margin-top:2px;line-height:1.3;font-weight:600;letter-spacing:.3px}
.tab-bar{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;background:white;border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:40}
.tab-bar::-webkit-scrollbar{display:none}
.tpill{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--gray);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.tpill.active{border-color:var(--navy);background:var(--navy);color:white}
.tpill .tc{background:rgba(0,0,0,.15);border-radius:10px;padding:1px 6px;font-size:10px}
.tpill:not(.active) .tc{background:rgba(0,0,0,.08)}
.search-wrap{padding:10px 16px 4px}
.search-inp{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;background:white;outline:none;color:var(--navy)}
.list-wrap{padding:10px 16px;display:flex;flex-direction:column;gap:10px}
.lcard{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow .15s}
.lcard.ov14{border-color:#FECACA;background:#FEF9F9}
.lcard.ov7{border-color:#FDE68A;background:#FFFDF0}
.lcard.sel{box-shadow:0 0 0 2.5px var(--gold)}
.lcard-body{padding:14px;display:flex;align-items:flex-start;gap:12px}
.av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:white;letter-spacing:-1px}
.lci{flex:1;min-width:0}
.lcname{font-weight:700;font-size:15px;color:var(--navy)}
.lcsub{font-size:12px;color:var(--navy3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lcmeta{font-size:11px;color:var(--gray);margin-top:3px}
.lcr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.sbadge{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.dbadge{font-size:12px;font-weight:700}
.fbadge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;border:1px solid}
.detail-wrap{border-top:1px solid var(--border);animation:sld .18s ease}
@keyframes sld{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dsec{padding:14px;border-bottom:1px solid var(--border)}
.dsec:last-child{border-bottom:none}
.ds-title{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.iitem{background:var(--bg);border-radius:10px;padding:10px 12px}
.ilbl{font-size:10px;color:var(--gray);margin-bottom:3px;font-weight:600}
.ival{font-size:13px;font-weight:700;color:var(--navy)}
.nbox{background:var(--bg);border-radius:10px;padding:12px;font-size:13px;color:#374151;line-height:1.5}
.srow{display:flex;gap:8px}
.sopt{flex:1;padding:10px 4px;border-radius:12px;border:2px solid transparent;font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .1s}
.sopt:active{opacity:.8}
.so-Hot{background:var(--hot-bg);color:var(--hot-tx);border-color:var(--hot)}
.so-Warm{background:var(--warm-bg);color:var(--warm-tx);border-color:var(--warm)}
.so-Cold{background:var(--cold-bg);color:var(--cold-tx);border-color:var(--cold)}
.so-Dead{background:var(--dead-bg);color:var(--dead-tx);border-color:var(--dead)}
.so-un{background:white;color:var(--gray);border-color:var(--border)}
.log-form{display:flex;flex-direction:column;gap:10px}
.lrow{display:flex;gap:8px}
.lsel,.ldate-i{flex:1;padding:12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;background:white;color:var(--navy);-webkit-appearance:none;outline:none}
.ltxt{width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;background:white;color:var(--navy);resize:none;outline:none;font-family:inherit}
.btn-log{width:100%;padding:14px;border-radius:12px;background:var(--navy);color:var(--gold);border:none;font-size:15px;font-weight:700;cursor:pointer}
.btn-log:active{opacity:.85}
.log-hist-item{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.lhi-top{display:flex;justify-content:space-between;margin-bottom:3px}
.lhi-type{font-size:11px;font-weight:700;color:var(--navy)}
.lhi-date{font-size:10px;color:var(--gray)}
.lhi-note{font-size:12px;color:#374151;line-height:1.4}
.act-row{display:flex;gap:8px;flex-wrap:wrap}
.act{flex:1;min-width:100px;padding:12px 8px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
.act:active{opacity:.8}
.act-edit{background:var(--amber-bg);color:var(--amber)}
.act-deal{background:var(--gold);color:var(--navy)}
.act-del{background:var(--red-bg);color:var(--red)}
.att-item{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:6px}
.att-nm{flex:1;font-size:13px;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.att-dt{font-size:10px;color:var(--gray);flex-shrink:0}
.att-dl{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;padding:2px 6px}
.att-add-row{display:flex;gap:8px;margin-top:6px}
.att-in{flex:1;padding:11px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;background:white;outline:none;min-width:0}
.btn-att{padding:11px 14px;border-radius:10px;background:var(--navy);color:white;border:none;font-size:13px;font-weight:700;cursor:pointer}

/* ── SCHEDULE TAB ──────────────────────────────── */
.sch-toolbar{display:flex;gap:8px;padding:12px 16px;align-items:center;background:white;border-bottom:1px solid var(--border)}
.sch-filter{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1}
.sch-filter::-webkit-scrollbar{display:none}
.sf-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--gray);font-size:12px;font-weight:700;cursor:pointer}
.sf-pill.active{background:var(--navy);color:white;border-color:var(--navy)}
.sch-add-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;background:var(--gold);color:var(--navy);border:none;font-size:12px;font-weight:700;cursor:pointer}
.sch-stats{display:flex;gap:10px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.sch-stats::-webkit-scrollbar{display:none}
.sch-stat{flex-shrink:0;background:white;border-radius:12px;border:1.5px solid var(--border);padding:10px 14px;text-align:center;min-width:72px}
.sch-stat-n{font-size:20px;font-weight:700}
.sch-stat-l{font-size:9px;color:var(--gray);font-weight:600;letter-spacing:.3px;margin-top:1px}
.sch-date-hdr{padding:8px 16px;font-size:11px;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;background:var(--bg)}
.boat-card{background:white;margin:0 16px 8px;border-radius:14px;border:1.5px solid var(--border);overflow:hidden}
.boat-card.flagged{border-color:#FECACA;background:#FEF9F9}
.boat-card.done{opacity:.7}
.bc-body{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.bc-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all .15s}
.bc-check.done{background:var(--green);border-color:var(--green);color:white}
.bc-check.inprog{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.bc-check.notdone{background:white}
.bc-info{flex:1;min-width:0}
.bc-name{font-weight:700;font-size:14px;color:var(--navy)}
.bc-owner{font-size:12px;color:var(--gray);margin-top:1px}
.bc-meta{font-size:11px;color:var(--gray);margin-top:2px}
.bc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.bc-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--cold-bg);color:var(--cold-tx)}
.bc-type.full{background:var(--navy);color:var(--gold)}
.bc-type.topside{background:var(--amber-bg);color:var(--amber)}
.bc-flag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--red-bg);color:var(--red)}
.bc-loc{font-size:10px;color:var(--gray)}
.bc-detail{border-top:1px solid var(--border);padding:12px 14px;background:var(--bg);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bc-status-btns{display:flex;gap:6px}
.bsb{padding:7px 12px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid transparent;cursor:pointer}
.bsb.notdone{background:var(--red-bg);color:var(--red);border-color:#FECACA}
.bsb.inprog{background:var(--amber-bg);color:var(--amber);border-color:#FDE68A}
.bsb.done{background:var(--green-bg);color:var(--green);border-color:#BBF7D0}
.bsb.active{box-shadow:0 0 0 2px var(--navy)}
.bc-notes-inp{flex:1;min-width:120px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;background:white;outline:none;color:var(--navy);font-family:inherit}
.bc-save-btn{padding:7px 14px;border-radius:8px;background:var(--navy);color:var(--gold);border:none;font-size:12px;font-weight:700;cursor:pointer}
.bc-del-btn{padding:7px 10px;border-radius:8px;background:var(--red-bg);color:var(--red);border:none;font-size:12px;font-weight:700;cursor:pointer}

/* ── CUSTOMERS TAB ─────────────────────────────── */
.cust-card{background:white;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer}
.cc-body{padding:14px;display:flex;align-items:flex-start;gap:12px}
.cc-info{flex:1;min-width:0}
.cc-name{font-weight:700;font-size:15px;color:var(--navy)}
.cc-sub{font-size:12px;color:var(--navy3);margin-top:2px}
.cc-meta{font-size:11px;color:var(--gray);margin-top:3px}

/* ── DEAL BUILDER ──────────────────────────────── */
.deal-wrap{padding:16px;display:flex;flex-direction:column;gap:14px}
.fgroup{display:flex;flex-direction:column;gap:5px}
.flbl{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase}
.finp{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;background:white;color:var(--navy);outline:none;-webkit-appearance:none;font-family:inherit}
.finp:focus{border-color:var(--gold)}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.calc-box{background:var(--navy);border-radius:16px;padding:16px;color:white;margin-top:4px}
.calc-ttl{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.calc-line{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.calc-line:last-child{border-bottom:none;margin-top:4px;padding-top:10px}
.calc-lbl{font-size:13px;color:rgba(255,255,255,.7)}
.calc-val{font-size:14px;font-weight:700;color:white}
.calc-val.pos{color:#4ADE80}
.calc-val.gold{color:var(--gold);font-size:20px}
.calc-val.neg{color:#F87171}

/* ── PAYMENT CALC ──────────────────────────────── */
.pay-wrap{padding:16px;display:flex;flex-direction:column;gap:14px}
.pay-result{background:var(--navy);border-radius:16px;padding:20px;text-align:center;color:white}
.pay-mo{font-size:48px;font-weight:700;color:var(--gold);line-height:1}
.pay-mo-lbl{font-size:13px;color:rgba(255,255,255,.6);margin-top:6px}
.pay-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.pay-item{background:rgba(255,255,255,.08);border-radius:10px;padding:10px}
.pay-item-lbl{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pay-item-val{font-size:14px;font-weight:700;color:white}

/* ── OVERLAYS / SHEETS ─────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:white;width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));max-height:92vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px}
.sheet-form{display:flex;flex-direction:column;gap:12px}
.sf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sf-field{display:flex;flex-direction:column;gap:5px}
.sf-field.full{grid-column:span 2}
.sf-lbl{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.8px;text-transform:uppercase}
.sf-inp,.sf-sel,.sf-ta{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:15px;background:white;color:var(--navy);outline:none;-webkit-appearance:none;font-family:inherit}
.sf-ta{resize:none}
.btn-submit{width:100%;padding:15px;border-radius:14px;background:var(--navy);color:var(--gold);border:none;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-cancel{width:100%;padding:13px;border-radius:14px;background:var(--bg);color:var(--gray);border:1.5px solid var(--border);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}

.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px) + 8px);left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.show{opacity:1}
.empty{text-align:center;padding:60px 24px;color:var(--gray)}
.empty-ico{font-size:48px;margin-bottom:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.apr-wrap{padding:16px;display:flex;flex-direction:column;gap:14px}
.apr-result{background:var(--navy);border-radius:16px;padding:16px;color:white}
.apr-ttl{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase}
.apr-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.apr-row:last-child{border-bottom:none;margin-top:4px;padding-top:10px}
.apr-lbl{font-size:13px;color:rgba(255,255,255,.7)}
.apr-val{font-size:15px;font-weight:700;color:white}
.apr-val.gold{color:var(--gold)}.apr-val.green{color:#4ADE80}.apr-val.red{color:#F87171}
.apr-note{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;font-style:italic}
.elec-wrap{padding:16px;display:flex;flex-direction:column;gap:14px}
.pkg-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.pkg-row::-webkit-scrollbar{display:none}
.pkg-btn{flex-shrink:0;padding:10px 16px;border-radius:12px;border:2px solid var(--border);background:white;font-size:13px;font-weight:700;cursor:pointer;color:var(--navy)}
.pkg-btn.active{border-color:var(--gold);background:var(--gold);color:var(--navy)}
.elec-section{background:white;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:8px}
.elec-sec-hdr{background:var(--navy);padding:10px 14px}
.elec-sec-ttl{color:var(--gold);font-weight:700;font-size:13px;letter-spacing:.5px}
.elec-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.elec-item:last-child{border-bottom:none}
.elec-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;background:white}
.elec-chk.checked{background:var(--navy);border-color:var(--navy);color:white}
.elec-info{flex:1}.elec-name{font-size:13px;font-weight:600;color:var(--navy)}
.elec-brand{font-size:11px;color:var(--gray);margin-top:1px}
.elec-price{font-size:13px;font-weight:700;color:var(--navy);flex-shrink:0}
.elec-total-box{background:var(--navy);border-radius:14px;padding:16px;color:white;display:flex;justify-content:space-between;align-items:center}
.elec-total-lbl{font-size:13px;color:rgba(255,255,255,.7)}
.elec-total-val{font-size:24px;font-weight:700;color:var(--gold)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-txt">
        <div class="t">SEAPORT INLET MARINA</div>
        <div class="s">SALES &amp; SERVICE CRM</div>
      </div>
    </div>
    <button class="hdr-btn" id="hdrAddBtn" onclick="openAddLead()">+ Add Lead</button>

<script>
const API = '';
let leads = [], customers = [], schedule = { boats: [] };
let activeLeadFilter = 'All';
let activeSchFilter = 'All';
let expandedLeadId = null;
let expandedBoatId = null;
let isEditing = false;

// ── UTILS ──────────────────────────────────────────────────
function fmt$(n) { return n ? '$' + Number(n).toLocaleString() : '—'; }
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + (d.includes('T') ? '' : 'T00:00:00'));
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function today() { return new Date().toISOString().split('T')[0]; }
function daysUntil(d) {
  if (!d) return null;
  const diff = new Date(d + 'T00:00:00') - new Date(today() + 'T00:00:00');
  return Math.round(diff / 86400000);
}
function avatarColor(name) {
  const colors = ['#1B2A4A','#2E4270','#C9A84C','#22C55E','#3B82F6','#F59E0B','#8B5CF6'];
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}
function initials(name) {
  const p = name.trim().split(/\s+/);
  return p.length > 1 ? p[0][0] + p[p.length-1][0] : p[0].slice(0,2);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function closeOnBg(e, id) { if (e.target.id === id) closeOverlay(id); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
function openOverlay(id) { document.getElementById(id).classList.add('open'); }

// ── NAVIGATION ─────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('hdrAddBtn').style.display = name === 'leads' ? '' : 'none';
  if (name === 'schedule') renderSchedule();
  if (name === 'customers') renderCustomers();
}

// ── API CALLS ──────────────────────────────────────────────
async function apiFetch(url, opts) {
  const r = await fetch(API + url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── LEADS ──────────────────────────────────────────────────
async function loadLeads() {
  try {
    leads = await apiFetch('/api/leads');
    renderLeads();
    updateStats();
  } catch(e) { console.error('Load leads error:', e); }
}

function updateStats() {
  const hot = leads.filter(l => l.status === 'Hot').length;
  const warm = leads.filter(l => l.status === 'Warm').length;
  const cold = leads.filter(l => l.status === 'Cold').length;
  const todayStr = today();

  const followUpToday = leads.filter(l =>
    l.status !== 'Dead' && l.followUpDate && l.followUpDate <= todayStr
  ).length;

  const needsContact = leads.filter(l => {
    if (l.status === 'Dead') return false;
    const d = daysUntil(l.followUpDate);
    const noFU = !l.followUpDate;
    const overdue = d !== null && d < -1;
    const noRecentContact = !l.lastContactDate || daysUntil(l.lastContactDate) < -7;
    return noFU || overdue || noRecentContact;
  }).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat" style="border-color:var(--hot)" onclick="filterLeads('Hot',document.querySelector('[data-filter=Hot]'))">
      <div class="stat-n" style="color:var(--hot)">${hot}</div><div class="stat-l">HOT</div></div>
    <div class="stat" style="border-color:var(--warm)" onclick="filterLeads('Warm',document.querySelector('[data-filter=Warm]'))">
      <div class="stat-n" style="color:var(--warm)">${warm}</div><div class="stat-l">WARM</div></div>
    <div class="stat" style="border-color:var(--cold)" onclick="filterLeads('Cold',document.querySelector('[data-filter=Cold]'))">
      <div class="stat-n" style="color:var(--cold)">${cold}</div><div class="stat-l">COLD</div></div>
    <div class="stat" style="border-color:var(--hot)" onclick="filterLeads('FollowUpToday',document.querySelector('[data-filter=FollowUpToday]'))">
      <div class="stat-n" style="color:var(--hot)">${followUpToday}</div><div class="stat-l">FOLLOW UP TODAY</div></div>
    <div class="stat" style="border-color:var(--red)" onclick="filterLeads('NeedsContact',document.querySelector('[data-filter=NeedsContact]'))">
      <div class="stat-n" style="color:var(--red)">${needsContact}</div><div class="stat-l">NEEDS CONTACT</div></div>
    <div class="stat" style="border-color:var(--border)">
      <div class="stat-n">${leads.length}</div><div class="stat-l">TOTAL</div></div>`;

  ['All','Hot','Warm','Cold','Dead'].forEach(f => {
    const el = document.getElementById('tc-' + f);
    if (el) el.textContent = f === 'All' ? leads.length : leads.filter(l => l.status === f).length;
  });
  const fuEl = document.getElementById('tc-FollowUpToday');
  if (fuEl) fuEl.textContent = followUpToday;
  const ncEl = document.getElementById('tc-NeedsContact');
  if (ncEl) ncEl.textContent = needsContact;

  const hotBadge = document.getElementById('hotBadge');
  if (hot > 0) { hotBadge.textContent = hot; hotBadge.style.display = ''; }
  else hotBadge.style.display = 'none';
}

function filterLeads(filter, btn) {
  activeLeadFilter = filter;
  document.querySelectorAll('.tpill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderLeads();
}

function renderLeads() {
  const q = (document.getElementById('leadSearch').value || '').toLowerCase();
  const todayStr = today();
  let list = leads.filter(l => {
    if (activeLeadFilter === 'FollowUpToday') {
      if (l.status === 'Dead') return false;
      return l.followUpDate && l.followUpDate <= todayStr;
    }
    if (activeLeadFilter === 'NeedsContact') {
      if (l.status === 'Dead') return false;
      const d = daysUntil(l.followUpDate);
      // No follow-up set, or overdue by more than 1 day, or no contact in 7+ days
      const noFU = !l.followUpDate;
      const overdue = d !== null && d < -1;
      const noRecentContact = !l.lastContactDate || daysUntil(l.lastContactDate) < -7;
      return noFU || overdue || noRecentContact;
    }
    if (activeLeadFilter !== 'All' && l.status !== activeLeadFilter) return false;
    if (!q) return true;
    return [l.name, l.boat, l.salesperson, l.phone, l.email, l.notes]
      .some(v => v && v.toLowerCase().includes(q));
  });

  // Apply search on top of special filters too
  if (q && (activeLeadFilter === 'FollowUpToday' || activeLeadFilter === 'NeedsContact')) {
    list = list.filter(l => [l.name, l.boat, l.salesperson, l.phone, l.email, l.notes]
      .some(v => v && v.toLowerCase().includes(q)));
  }

  const wrap = document.getElementById('leadsList');
  if (!list.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-ico">🎯</div><div>No leads found</div></div>`;
    return;
  }

  wrap.innerHTML = list.map(l => {
    const days = daysUntil(l.followUpDate);
    const overdue = l.status !== 'Dead' && days !== null && days < 0;
    const dueSoon = l.status !== 'Dead' && days !== null && days >= 0 && days <= 7;
    const cls = overdue ? 'ov14' : dueSoon ? 'ov7' : '';
    const statusColors = {Hot:'var(--hot-bg);color:var(--hot-tx)',Warm:'var(--warm-bg);color:var(--warm-tx)',Cold:'var(--cold-bg);color:var(--cold-tx)',Dead:'var(--dead-bg);color:var(--dead-tx)'};
    const sc = statusColors[l.status] || statusColors.Cold;
    let fuLabel = '';
    if (days === 0) fuLabel = `<span class="fbadge" style="background:var(--hot-bg);color:var(--hot-tx);border-color:var(--hot)">TODAY</span>`;
    else if (days === 1) fuLabel = `<span class="fbadge" style="background:var(--amber-bg);color:var(--amber);border-color:var(--amber)">TOMORROW</span>`;
    else if (overdue) fuLabel = `<span class="fbadge" style="background:var(--red-bg);color:var(--red);border-color:var(--red)">${Math.abs(days)}d OVERDUE</span>`;
    else if (days !== null && days <= 7) fuLabel = `<span class="fbadge" style="background:var(--cold-bg);color:var(--cold-tx);border-color:var(--cold)">in ${days}d</span>`;

    const isExp = expandedLeadId === l.id;

    return `
    <div class="lcard ${cls} ${isExp ? 'sel' : ''}" id="lcard-${l.id}">
      <div class="lcard-body" onclick="toggleLead(${l.id})">
        <div class="av" style="background:${avatarColor(l.name)}">${initials(l.name).toUpperCase()}</div>
        <div class="lci">
          <div class="lcname">${l.name}</div>
          <div class="lcsub">${l.boat || 'No boat specified'}</div>
          <div class="lcmeta">${l.salesperson || '—'} · Last: ${l.lastContactType || '—'} ${l.lastContactDate ? fmtDate(l.lastContactDate) : ''}</div>
        </div>
        <div class="lcr">
          <span class="sbadge" style="background:${sc}">${l.status}</span>
          ${l.budget ? `<span class="dbadge" style="color:var(--navy)">${fmt$(l.budget)}</span>` : ''}
          ${fuLabel}
        </div>
      </div>
      ${isExp ? renderLeadDetail(l) : ''}
    </div>`;
  }).join('');
}

function renderLeadDetail(l) {
  const days = daysUntil(l.followUpDate);
  const overdue = l.status !== 'Dead' && days !== null && days < 0;
  const fuColor = overdue ? 'var(--red)' : days === 0 ? 'var(--hot)' : days !== null && days <= 3 ? 'var(--amber)' : 'var(--navy)';
  const fuText = !l.followUpDate ? 'Not set' : days === 0 ? 'Today' : days === 1 ? 'Tomorrow' : overdue ? `${Math.abs(days)}d overdue` : `in ${days}d`;
  return `
  <div class="detail-wrap">
    <div class="dsec">
      <div class="ds-title">Status</div>
      <div class="srow">
        ${['Hot','Warm','Cold','Dead'].map(s =>
          `<button class="sopt so-${s} ${l.status === s ? '' : 'so-un'}" onclick="updateStatus(${l.id},'${s}')">${s}</button>`
        ).join('')}
      </div>
    </div>
    <div class="dsec">
      <div class="ds-title">Deal Info</div>
      <div class="igrid">
        <div class="iitem"><div class="ilbl">BUDGET</div><div class="ival">${fmt$(l.budget)}</div></div>
        <div class="iitem"><div class="ilbl">TRADE-IN</div><div class="ival">${l.tradeIn || '—'}</div></div>
        <div class="iitem"><div class="ilbl">PHONE</div><div class="ival">${l.phone || '—'}</div></div>
        <div class="iitem"><div class="ilbl">EMAIL</div><div class="ival" style="font-size:11px;word-break:break-all">${l.email || '—'}</div></div>
        <div class="iitem"><div class="ilbl">SALESPERSON</div><div class="ival">${l.salesperson || '—'}</div></div>

async function toggleLead(id) {
  if (expandedLeadId === id) {
    expandedLeadId = null;
    renderLeads();
    return;
  }
  expandedLeadId = id;
  renderLeads();
  loadLogHistory(id);
}

async function loadLogHistory(id) {
  try {
    const logs = await apiFetch('/api/leads/' + id + '/log');
    const el = document.getElementById('logHist-' + id);
    if (!el) return;
    el.innerHTML = '<div class="ds-title">Contact History</div>' +
      (logs.length ? logs.map(e => `
        <div class="log-hist-item">
          <div class="lhi-top">
            <span class="lhi-type">${e.contactType || '—'}</span>
            <span class="lhi-date">${fmtDate(e.contactDate || e.loggedAt)}</span>
          </div>
          <div class="lhi-note">${e.notes || 'No notes'}</div>
        </div>`).join('') :
        '<div style="font-size:13px;color:var(--gray)">No contact logged yet.</div>');
  } catch(e) {}
}

async function updateStatus(id, status) {
  try {
    const updated = await apiFetch('/api/leads/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status })
    });
    const idx = leads.findIndex(l => l.id === id);
    if (idx !== -1) leads[idx] = updated;
    renderLeads();
    updateStats();
    showToast('Status updated to ' + status);
    if (expandedLeadId === id) loadLogHistory(id);
  } catch(e) { showToast('Error updating status'); }
}

async function logContact(id) {
  const type = document.getElementById('logType-' + id)?.value;
  const date = document.getElementById('logDate-' + id)?.value;
  const notes = document.getElementById('logNote-' + id)?.value;
  const nextFU = document.getElementById('logNextFU-' + id)?.value;
  if (!type) return;
  try {
    // Log the contact
    const updated = await apiFetch('/api/leads/' + id + '/log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ contactType: type, contactDate: date, notes })
    });
    // If a next follow-up date was set, patch the lead to update it
    let final = updated;
    if (nextFU) {
      final = await apiFetch('/api/leads/' + id, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ followUpDate: nextFU })
      });
    }
    const idx = leads.findIndex(l => l.id === id);
    if (idx !== -1) leads[idx] = final;
    renderLeads();
    updateStats();
    showToast('Contact logged ✓' + (nextFU ? ' · Follow-up set' : ''));
    loadLogHistory(id);
  } catch(e) { showToast('Error logging contact'); }
}

async function setFollowUp(id, fromLogSection) {
  const inputId = fromLogSection ? 'logNextFU-' + id : 'fuDate-' + id;
  const date = document.getElementById(inputId)?.value;
  if (!date) { showToast('Pick a date first'); return; }
  try {
    const updated = await apiFetch('/api/leads/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ followUpDate: date })
    });
    const idx = leads.findIndex(l => l.id === id);
    if (idx !== -1) leads[idx] = updated;
    renderLeads();
    updateStats();
    showToast('Follow-up set to ' + fmtDate(date));
    loadLogHistory(id);
  } catch(e) { showToast('Error updating follow-up'); }
}

async function setFollowUpDays(id, days, fillOnly) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  const dateStr = d.toISOString().split('T')[0];
  // If fillOnly = true, just fill the input in the log section (don't save yet)
  if (fillOnly) {
    const el = document.getElementById('logNextFU-' + id);
    if (el) el.value = dateStr;
    return;
  }
  // Otherwise immediately save
  try {
    const updated = await apiFetch('/api/leads/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ followUpDate: dateStr })
    });
    const idx = leads.findIndex(l => l.id === id);
    if (idx !== -1) leads[idx] = updated;
    // Also update the date input so user sees what was set
    const el = document.getElementById('fuDate-' + id);
    if (el) el.value = dateStr;
    renderLeads();
    updateStats();
    showToast('Follow-up set: ' + fmtDate(dateStr));
    loadLogHistory(id);
  } catch(e) { showToast('Error setting follow-up'); }
}

async function deleteLead(id) {
  if (!confirm('Delete this lead?')) return;
  try {
    await apiFetch('/api/leads/' + id, { method: 'DELETE' });
    leads = leads.filter(l => l.id !== id);
    expandedLeadId = null;
    renderLeads();
    updateStats();
    showToast('Lead deleted');
  } catch(e) { showToast('Error deleting lead'); }
}

async function submitLead() {

  if (!name) { showToast('Name is required'); return; }
  const payload = {
    name,
    phone: document.getElementById('lf-phone').value,

    boat: document.getElementById('lf-boat').value,

        headers: {'Content-Type':'application/json'},

      });

async function loadSchedule() {
  try {
    const data = await apiFetch('/api/schedule');
    schedule = data;
  } catch(e) { schedule = { boats: [] }; }
}

function renderSchedule() {
  const boats = schedule.boats || [];
  const flagged = boats.filter(b => b.flagged && b.status !== 'Done').length;
  const done = boats.filter(b => b.status === 'Done').length;
  const notDone = boats.filter(b => b.status === 'Not Done').length;
  const inProg = boats.filter(b => b.status === 'In Progress').length;

  document.getElementById('schStats').innerHTML = `
    <div class="sch-stat"><div class="sch-stat-n" style="color:var(--red)">${flagged}</div><div class="sch-stat-l">FLAGGED</div></div>
    <div class="sch-stat"><div class="sch-stat-n" style="color:var(--amber)">${inProg}</div><div class="sch-stat-l">IN PROGRESS</div></div>
    <div class="sch-stat"><div class="sch-stat-n" style="color:var(--gray)">${notDone}</div><div class="sch-stat-l">NOT DONE</div></div>
    <div class="sch-stat"><div class="sch-stat-n" style="color:var(--green)">${done}</div><div class="sch-stat-l">DONE</div></div>
    <div class="sch-stat"><div class="sch-stat-n">${boats.length}</div><div class="sch-stat-l">TOTAL</div></div>`;

  const flagBadge = document.getElementById('flagBadge');
  if (flagged > 0) { flagBadge.textContent = flagged; flagBadge.style.display = ''; }
  else flagBadge.style.display = 'none';

  let filtered = boats;
  if (activeSchFilter === 'Flagged') filtered = boats.filter(b => b.flagged && b.status !== 'Done');
  else if (activeSchFilter !== 'All') filtered = boats.filter(b => b.status === activeSchFilter);

  // Sort: flagged first, then by date, done last
  filtered.sort((a, b) => {
    if (a.flagged && !b.flagged) return -1;
    if (!a.flagged && b.flagged) return 1;
    if (a.status === 'Done' && b.status !== 'Done') return 1;
    if (a.status !== 'Done' && b.status === 'Done') return -1;
    return new Date(a.scheduledDate || a.addedAt) - new Date(b.scheduledDate || b.addedAt);
  });

  const wrap = document.getElementById('boatList');
  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div>No boats in this view.</div></div>`;
    return;
  }

  wrap.innerHTML = filtered.map(b => {
    const isExp = expandedBoatId === b.id;
    const isDone = b.status === 'Done';
    const checkCls = isDone ? 'done' : b.status === 'In Progress' ? 'inprog' : 'notdone';
    const checkIco = isDone ? '✓' : b.status === 'In Progress' ? '◑' : '';
    const typeCls = b.serviceType === 'Full' || b.serviceType === 'Commission' ? 'full' :
                    b.serviceType === 'Topside' ? 'topside' : '';
    return `
    <div class="boat-card ${b.flagged && !isDone ? 'flagged' : ''} ${isDone ? 'done' : ''}" id="bcard-${b.id}">
      <div class="bc-body">
        <div class="bc-check ${checkCls}" onclick="quickStatusCycle(${b.id},event)">${checkIco}</div>
        <div class="bc-info">
          <div class="bc-name">${b.boatName}${b.flagged && !isDone ? ' 🚩' : ''}</div>
          <div class="bc-owner">${b.owner || 'Unknown owner'} ${b.reg ? '· ' + b.reg : ''}</div>
          <div class="bc-meta">${b.location || ''} ${b.scheduledDate ? '· ' + fmtDate(b.scheduledDate) : ''}</div>
        </div>
        <div class="bc-right">
          <span class="bc-type ${typeCls}">${b.serviceType || 'Detail'}</span>
          ${b.flagged && !isDone ? '<span class="bc-flag">OVERDUE</span>' : ''}
          <span class="bc-loc">${b.ownerType || ''}</span>
        </div>
      </div>
      ${isExp ? renderBoatDetail(b) : ''}
    </div>`;
  }).join('');
}

function renderBoatDetail(b) {
  return `
  <div class="bc-detail">
    <div class="bc-status-btns">
      <button class="bsb notdone ${b.status === 'Not Done' ? 'active' : ''}" onclick="setBoatStatus(${b.id},'Not Done')">Not Done</button>
      <button class="bsb inprog ${b.status === 'In Progress' ? 'active' : ''}" onclick="setBoatStatus(${b.id},'In Progress')">In Progress</button>
      <button class="bsb done ${b.status === 'Done' ? 'active' : ''}" onclick="setBoatStatus(${b.id},'Done')">Done ✓</button>
    </div>
    <input class="bc-notes-inp" id="bnotes-${b.id}" placeholder="Add note..." value="${b.notes || ''}">
    <button class="bc-save-btn" onclick="saveBoatNote(${b.id})">Save</button>
    <button class="bc-del-btn" onclick="deleteBoat(${b.id})">🗑</button>
  </div>`;
}

// Tap the circle to cycle through statuses
async function quickStatusCycle(id, e) {
  e.stopPropagation();
  const boat = (schedule.boats || []).find(b => b.id === id);
  if (!boat) return;
  const cycle = { 'Not Done': 'In Progress', 'In Progress': 'Done', 'Done': 'Not Done' };
  const next = cycle[boat.status] || 'In Progress';
  await setBoatStatus(id, next);
}

async function setBoatStatus(id, status) {
  try {
    const updated = await apiFetch('/api/schedule/boats/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status })
    });
    const idx = (schedule.boats || []).findIndex(b => b.id === id);
    if (idx !== -1) schedule.boats[idx] = updated;
    renderSchedule();
    showToast(status === 'Done' ? '✓ Marked Done' : 'Status: ' + status);
  } catch(e) { showToast('Error updating status'); }
}

function renderElectronics() {
  const items = window._elecItems || [];
  const total = items.reduce((s,cat) => s + cat.items.filter(i=>i.checked).reduce((a,i)=>a+i.price,0), 0);
  document.getElementById('toolContent').innerHTML = `
  <div class="elec-wrap">
    <div style="font-size:14px;font-weight:700;color:var(--navy);padding:0 0 4px">Electronics Builder</div>
    ${items.map((cat,ci) => `
    <div class="elec-section">
      <div class="elec-sec-hdr"><span class="elec-sec-ttl">${cat.cat}</span></div>
      ${cat.items.map((item,ii) => `
      <div class="elec-item">
        <div class="elec-chk ${item.checked?'checked':''}" onclick="toggleElec(${ci},${ii})">${item.checked?'✓':''}</div>
        <div class="elec-info">
          <div class="elec-name">${item.name}</div>
          <div class="elec-brand">${item.brand}</div>
        </div>
        <div class="elec-price">${fmt$(item.price)}</div>
      </div>`).join('')}
    </div>`).join('')}
    <div class="elec-total-box">
      <span class="elec-total-lbl">Electronics Total</span>
      <span class="elec-total-val">${fmt$(total)}</span>
    </div>
    <button onclick="sendElecsToDeal()" style="width:100%;padding:14px;border-radius:12px;background:var(--gold);color:var(--navy);border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px">Send to Deal Builder →</button>
  </div>`;
}

function toggleElec(ci, ii) {
  if (window._elecItems && window._elecItems[ci]) {
    window._elecItems[ci].items[ii].checked = !window._elecItems[ci].items[ii].checked;
    renderElectronics();
  }
}

function sendElecsToDeal() {
  const total = (window._elecItems||[]).reduce((s,cat)=>s+cat.items.filter(i=>i.checked).reduce((a,i)=>a+i.price,0),0);
  showTool('deal');
  setTimeout(()=>{ const el = document.getElementById('db-elec'); if(el){el.value=total;calcDeal();} },150);
  showToast('Electronics added to Deal Builder ✓');
}

function calcAppraisal() {
  const year = parseInt(document.getElementById('ap-year')?.value)||0;
  const len = parseInt(document.getElementById('ap-len')?.value)||0;
  const hrs = parseInt(document.getElementById('ap-hrs')?.value)||0;
  const cond = parseFloat(document.getElementById('ap-cond')?.value)||0.88;
  const trailer = parseInt(document.getElementById('ap-trailer')?.value)||0;
  if (!year || !len) return;
  const age = new Date().getFullYear() - year;
  const basePerFt = len<=20?3200:len<=25?4100:len<=30?5200:len<=35?7500:10000;
  const base = len * basePerFt;
  const ageFactor = Math.max(0.25, 1-(age*0.065));
  const hrsFactor = hrs<200?1.0:hrs<500?0.95:hrs<1000?0.87:hrs<1500?0.78:0.68;
  const est = Math.round(base*ageFactor*hrsFactor*cond/500)*500;
  const low = Math.round(est*0.88/500)*500;
  const high = Math.round(est*1.08/500)*500;
  const retail = Math.round(est*1.18/500)*500;
  const condLabels = {'1.0':'Excellent','0.88':'Good','0.75':'Fair','0.60':'Poor'};
  document.getElementById('aprResult').innerHTML = `
    <div class="apr-ttl">Estimated Trade-In Value</div>
    <div class="apr-row"><span class="apr-lbl">Wholesale Low</span><span class="apr-val red">${fmt$(low+trailer)}</span></div>
    <div class="apr-row"><span class="apr-lbl">Trade-In Range</span><span class="apr-val gold">${fmt$(low+trailer)} – ${fmt$(high+trailer)}</span></div>
    <div class="apr-row"><span class="apr-lbl">Retail Est.</span><span class="apr-val green">${fmt$(retail+trailer)}</span></div>
    ${trailer?`<div class="apr-row"><span class="apr-lbl">Trailer Included</span><span class="apr-val">+ ${fmt$(trailer)}</span></div>`:''}
    <div class="apr-note">Estimate only — verify with BUC Book or NADA. ${age}yr old · ${hrs} hrs · ${condLabels[String(cond)]||'Good'} condition.</div>`;
}

function calcDeal() {
  const price = Number(document.getElementById('db-price')?.value) || 0;
  const trade = Number(document.getElementById('db-trade')?.value) || 0;
  const down = Number(document.getElementById('db-down')?.value) || 0;
  const taxPct = Number(document.getElementById('db-tax')?.value) || 6.625;
  const fees = Number(document.getElementById('db-fees')?.value) || 350;
  const elec = Number(document.getElementById('db-elec')?.value) || 0;
  if (!price) return;
  const taxable = price + elec - trade;
  const tax = taxable > 0 ? taxable * (taxPct / 100) : 0;
  const total = price + elec + tax + fees - trade - down;
  document.getElementById('dealCalc').innerHTML = `
    <div class="calc-ttl">Deal Summary</div>
    <div class="calc-line"><span class="calc-lbl">Boat Price</span><span class="calc-val">${fmt$(price)}</span></div>
    ${elec ? `<div class="calc-line"><span class="calc-lbl">Electronics</span><span class="calc-val">+ ${fmt$(elec)}</span></div>` : ''}
    ${trade ? `<div class="calc-line"><span class="calc-lbl">Trade-In Credit</span><span class="calc-val pos">- ${fmt$(trade)}</span></div>` : ''}
    <div class="calc-line"><span class="calc-lbl">Sales Tax (${taxPct}%)</span><span class="calc-val neg">+ ${fmt$(Math.round(tax))}</span></div>
    <div class="calc-line"><span class="calc-lbl">Fees</span><span class="calc-val neg">+ ${fmt$(fees)}</span></div>
    ${down ? `<div class="calc-line"><span class="calc-lbl">Down Payment</span><span class="calc-val pos">- ${fmt$(down)}</span></div>` : ''}
    <div class="calc-line"><span class="calc-lbl">Amount to Finance</span><span class="calc-val gold">${fmt$(Math.max(0, Math.round(total)))}</span></div>`;
}

function calcPayment() {
  const P = Number(document.getElementById('pc-amt')?.value) || 0;
  const r = (Number(document.getElementById('pc-rate')?.value) || 7.5) / 100 / 12;
  const n = Number(document.getElementById('pc-term')?.value) || 180;
  if (!P) return;
  const mo = r ? P * r * Math.pow(1+r,n) / (Math.pow(1+r,n) - 1) : P / n;
  const total = mo * n;
  document.getElementById('payMo').textContent = '$' + Math.round(mo).toLocaleString();
  document.getElementById('payBreak').innerHTML = `
    <div class="pay-item"><div class="pay-item-lbl">Total Paid</div><div class="pay-item-val">${fmt$(Math.round(total))}</div></div>
    <div class="pay-item"><div class="pay-item-lbl">Total Interest</div><div class="pay-item-val">${fmt$(Math.round(total - P))}</div></div>
    <div class="pay-item"><div class="pay-item-lbl">Term</div><div class="pay-item-val">${n} mo</div></div>
    <div class="pay-item"><div class="pay-item-lbl">Rate</div><div class="pay-item-val">${document.getElementById('pc-rate').value}%</div></div>`;
}

function openDealBuilder(leadId) {
  const l = leads.find(x => x.id === leadId);
  showPage('tools', document.getElementById('navTools'));
  showTool('deal');
  if (l && l.budget) {
    setTimeout(() => {
      document.getElementById('db-price').value = l.budget;
      calcDeal();
    }, 100);
  }
}

// ── INIT ───────────────────────────────────────────────────
async function init() {
  document.getElementById('hdrAddBtn').style.display = '';
  await Promise.all([loadLeads(), loadCustomers(), loadSchedule()]);
}

init();
