<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seaport CRM</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%E2%9A%93%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <span class="brand-icon">⚓</span>
        <span class="brand-text">Seaport CRM</span>
      </div>
      <nav id="nav"></nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="link-btn" hidden>Log out</button>
      </div>
    </aside>

    <main id="main">
      <header id="topbar">
        <h1 id="page-title">Loading…</h1>
        <button id="new-btn" class="primary" hidden>+ New</button>
      </header>
      <section id="content"></section>
    </main>
  </div>

  <!-- Login screen -->
  <div id="login-overlay" class="overlay" hidden>
    <form id="login-form" class="card">
      <h2>Seaport CRM</h2>
      <p>This CRM is password-protected.</p>
      <label>
        Password
        <input type="password" id="login-password" autocomplete="current-password" required />
      </label>
      <div id="login-error" class="error" hidden></div>
      <button class="primary" type="submit">Log in</button>
    </form>
  </div>

  <!-- Edit / create modal -->
  <div id="modal-overlay" class="overlay" hidden>
    <form id="record-form" class="card wide"></form>
  </div>

  <script src="/app.js"></script>
</body>
</html>
