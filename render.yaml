# Render Blueprint: Postgres + web service + daily follow-up cron job.
# Push this file to the repo, then in Render: New + → Blueprint → pick this repo.

databases:
  - name: seaport-crm-db
    plan: free
    databaseName: seaport_crm
    user: seaport_crm

services:
  # ── Web service ────────────────────────────────────────────────────────
  # Daily follow-up emails are triggered by a GitHub Action that hits
  # /api/_cron/run-followups on this service (see .github/workflows/).
  # Render's cron service requires a paid plan, so we use a free webhook
  # instead.
  - type: web
    name: seaport-crm
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seaport-crm-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Stable secret used to sign session cookies. Render generates it once.
      - key: SESSION_SECRET
        generateValue: true
      # Shared secret for the daily-email webhook. Render generates it once;
      # copy it into your GitHub repo secrets as CRON_SECRET so the Action
      # can call the webhook.
      - key: CRON_SECRET
        generateValue: true
      # Set this to your CRM's public URL once known (e.g. https://seaport-crm-xxxx.onrender.com)
      # so the daily emails include working links. Leave blank if you don't care.
      - key: APP_URL
        sync: false
      # Gmail SMTP for the daily follow-up email (optional — leave unset
      # and the webhook runs but doesn't actually send mail, just logs).
      # GMAIL_USER         = the Gmail address that sends the email
      # GMAIL_APP_PASSWORD = 16-char Google App Password (NOT your Gmail password)
      #                      Create one at https://myaccount.google.com/apppasswords
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
