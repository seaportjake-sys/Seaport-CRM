# Render Blueprint: spins up a free Postgres + a web service and wires DATABASE_URL.
# Push this file to the repo, then in Render: New + → Blueprint → pick this repo.
databases:
  - name: seaport-crm-db
    plan: free
    databaseName: seaport_crm
    user: seaport_crm

services:
  - type: web
    name: seaport-crm
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seaport-crm-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Set a value to require a shared password to access the site.
      # Leave blank to leave the CRM open.
      - key: APP_PASSWORD
        sync: false
